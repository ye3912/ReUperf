name: Build Thread Scheduler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean workspace
      run: |
        rm -rf build/ CMakeCache.txt CMakeFiles/
        mkdir -p build

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          make \
          g++ \
          nlohmann-json3-dev
        echo "✅ Dependencies installed successfully"

    - name: Configure CMake
      run: |
        cd build
        cmake .. \
          -DCMAKE_C_COMPILER=gcc \
          -DCMAKE_CXX_COMPILER=g++ \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_STATIC=OFF \
          -DCMAKE_DISABLE_TERMUX_DETECTION=ON
        echo "CMake configuration completed"

    - name: Build with verbose output
      run: |
        cd build
        make VERBOSE=1
        echo "Build completed"

    - name: Verify executable
      run: |
        if [ -f "build/thread_scheduler" ]; then
          echo "✅ Build successful!"
          echo "Executable: build/thread_scheduler"
          ls -lh build/thread_scheduler
        else
          echo "❌ Executable not found"
          find build/ -type f -name "thread_scheduler" || echo "No thread_scheduler file found"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: thread-scheduler-bin
        path: build/thread_scheduler
        retention-days: 7

