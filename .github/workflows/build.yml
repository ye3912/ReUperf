name: Build Thread Scheduler

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64, x86]
        build_type: [dynamic, static]
        api_level: [29]
    
    steps:
    # ✅ [更新] checkout@v5
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Clean Build Directory
      run: |
        rm -rf build CMakeCache.txt CMakeFiles cmake_install.cmake
        echo "✅ Cleaned build artifacts"
    # ⚠️ 保持 setup-android@v3（等待官方 Node 24 支持）
    - uses: android-actions/setup-android@v3

    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b
        add-to-path: true

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential nlohmann-json3-dev lld
    - name: Configure CMake
      run: |
        echo "🔧 Configuring CMake for ${{ matrix.arch }} (${{ matrix.build_type }})..."
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.arch }} \
          -DANDROID_PLATFORM=android-${{ matrix.api_level }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID_STL=c++_${{ matrix.build_type == 'static' && 'static' || 'shared' }} \
          -DBUILD_STATIC=${{ matrix.build_type == 'static' && 'ON' || 'OFF' }} \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_CXX_STANDARD_REQUIRED=ON \
          -DCMAKE_CXX_EXTENSIONS=OFF \
          -DCMAKE_CXX_FLAGS="-Wall -Wextra -O2 -ffunction-sections -fdata-sections" \
          -DCMAKE_EXE_LINKER_FLAGS="-Wl,--gc-sections" \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -S .
        echo "✅ CMake configuration completed"
        echo "📋 CMake Cache Summary:"
        grep -E "(CMAKE_CXX_COMPILER|CMAKE_SYSTEM_PROCESSOR|ANDROID_ABI)" build/CMakeCache.txt || true
    - name: Build Project
      run: |
        echo "🔨 Building for ${{ matrix.arch }} (${{ matrix.build_type }})..."
        cmake --build build --config Release --parallel $(nproc) 2>&1 | tee build.log || {
          echo "❌ BUILD FAILED!"
          echo ""
          echo "📋 ===== Build Log Summary ====="
          echo ""
          echo "🔴 Errors found in build.log:"
          grep -i "error:" build.log | head -20 || echo "No 'error:' pattern found"
          echo ""
          echo "⚠️  Warnings found in build.log:"
          grep -i "warning:" build.log | head -10 || echo "No 'warning:' pattern found"
          echo ""
          echo "📄 Last 50 lines of build output:"
          tail -50 build.log
          echo ""
          echo "📁 Build directory contents:"
          ls -lh build/ || true
          exit 1
        }
        echo "✅ Build completed successfully"

    - name: Upload Build Log (on failure)
      if: failure()
      uses: actions/upload-artifact@v5
      with:
        name: build-log-${{ matrix.arch }}-${{ matrix.build_type }}
        path: build.log
        retention-days: 7
        
    - name: Verify Binary
      run: |
        echo "🔍 Verifying build output..."
        BINARY="build/thread_scheduler"
        if [ ! -f "$BINARY" ]; then
          echo "❌ ERROR: Binary not found at $BINARY"
          echo ""
          echo "📁 Build directory contents:"
          ls -lh build/ || true
          exit 1
        fi
        echo "✅ Binary found: $BINARY"
        echo ""
        echo "📦 File information:"
        file "$BINARY"
        echo ""
        echo "📊 Binary size:"
        ls -lh "$BINARY"
        echo ""
        echo "🔧 Binary dependencies:"
        ldd "$BINARY" || echo "(ldd not available for Android binary)"
        echo ""
        echo "✅ Binary validation passed"
    # ✅ [更新] upload-artifact@v5（注意：v5 默认不合并多个 artifact）
    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: thread_scheduler-${{ matrix.arch }}-${{ matrix.build_type }}
        path: build/thread_scheduler
        retention-days: 30
        if-no-files-found: error

  release:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    # ✅ [更新] download-artifact@v5（v5 需要指定 pattern 或 merge-multiple）
    - name: Download All Artifacts
      uses: actions/download-artifact@v5
      with:
        path: release_assets
        pattern: thread_scheduler-*
        merge-multiple: true

    - name: List Released Files
      run: ls -lh release_assets/
    - name: Generate SHA256 Checksums
      run: |
        cd release_assets
        sha256sum * > SHA256SUMS.txt
        echo "🔐 Checksums:"
        cat SHA256SUMS.txt
    # ✅ 保持 action-gh-release@v2（已兼容）
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          release_assets/thread_scheduler-*
          release_assets/SHA256SUMS.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

